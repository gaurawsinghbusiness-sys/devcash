<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>devcash - Currency Converter</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: #1D9E75;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 16px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>devcash 🪙</h1>
  <p>A simple currency converter.</p>
<input type="number" id="amount" placeholder="Enter amount" />
  <select id="from">
    <option value="USD">USD - US Dollar</option>
    <option value="EUR">EUR - Euro</option>
    <option value="INR">INR - Indian Rupee</option>
    <option value="GBP">GBP - British Pound</option>
  </select>
  <select id="to">
    <option value="INR">INR - Indian Rupee</option>
    <option value="USD">USD - US Dollar</option>
    <option value="EUR">EUR - Euro</option>
    <option value="GBP">GBP - British Pound</option>
  </select>
  <button onclick="convert()">Convert</button>
  <div id="result"></div>
  <script>
    const rates = {
      USD: { INR: 83.5, EUR: 0.92, GBP: 0.79, USD: 1 },
      EUR: { INR: 90.8, USD: 1.09, GBP: 0.86, EUR: 1 },
      INR: { USD: 0.012, EUR: 0.011, GBP: 0.0095, INR: 1 },
      GBP: { INR: 105.6, USD: 1.27, EUR: 1.16, GBP: 1 }
    };
    function convert() {
      const amount = document.getElementById('amount').value;
      const from = document.getElementById('from').value;
      const to = document.getElementById('to').value;
      const result = (amount * rates[from][to]).toFixed(2);
      document.getElementById('result').textContent =
        `${amount} ${from} = ${result} ${to}`;
    }
  </script>
</body>
</html>
